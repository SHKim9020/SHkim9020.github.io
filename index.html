<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ecb735">
<title>직코LAB Web</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="logo"><b>직코</b><strong>LAB</strong><small>WEB</small></div>
  <div class="head-tools">
    <select id="board"><option value="uno">Arduino Uno</option><option value="nano">Arduino Nano</option><option value="nano_old">Nano Old Bootloader</option></select>
    <button id="connect">🔌 연결</button><span id="status">연결 안 됨</span>
    <input id="name" value="새 프로젝트" aria-label="프로젝트 이름">
    <button id="save">💾 저장</button><button id="open">📂 열기</button><input id="file" type="file" accept=".json,.jikko" hidden>
    <button id="ino">⬇ INO</button><button id="upload" class="green">⬆ 업로드</button>
  </div>
</header>
<nav class="tabs"><button data-view="blocks" class="active">▰ 코드</button><button data-view="code">⌨ 텍스트 코딩</button><button data-view="serial">▤ 시리얼 모니터</button></nav>
<main>
  <aside id="cats" class="cats"></aside>
  <section class="palette"><h2 id="catTitle">이벤트</h2><div id="palette"></div></section>
  <section class="workspace">
    <div class="workbar"><button id="undo">↶</button><button id="redo">↷</button><span>블록을 누르면 작업 공간에 추가됩니다.</span><button id="clear">모두 지우기</button></div>
    <div id="program"></div><div id="guide">🧩<b>왼쪽 블록을 눌러 코딩을 시작하세요.</b></div>
  </section>
  <aside class="right">
    <section class="codebox"><div class="title"><b>Arduino C++</b><button id="copy">복사</button></div><textarea id="code" spellcheck="false"></textarea></section>
    <section class="serialbox"><div class="title"><b>시리얼 모니터</b><select id="baud"><option>9600</option><option>57600</option><option selected>115200</option></select><button id="serialOpen">열기</button><button id="serialClear">지우기</button></div><pre id="serialOut"></pre><div class="send"><input id="serialIn" placeholder="전송 내용"><button id="send">Send</button></div></section>
  </aside>
</main>
<div id="toast"></div>
<dialog id="progress"><h2 id="pTitle">컴파일 중</h2><p id="pText"></p><progress id="bar" max="100"></progress><pre id="log"></pre><button id="closeProgress">닫기</button></dialog>
<script src="app.js"></script>
</body>
</html>
