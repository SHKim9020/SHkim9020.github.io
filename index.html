<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#eab536">
<title>직코LAB Web</title>
<link rel="stylesheet" href="style.css">
</head>
<body data-view="blocks">
<header>
  <div class="logo"><b>직코</b><strong>LAB</strong><small>WEB</small></div>
  <div class="head-tools">
    <select id="board" aria-label="보드 선택"><option value="uno">Arduino Uno</option><option value="nano">Arduino Nano</option><option value="nano_old">Nano Old Bootloader</option></select>
    <button id="connect">🔌 연결</button><span id="status">연결 안 됨</span>
    <input id="name" value="스크래치 프로젝트" aria-label="프로젝트 이름">
    <button id="save">💾 저장</button><button id="open">📂 열기</button><input id="file" type="file" accept=".json,.jikko" hidden>
    <button id="ino">⬇ INO</button><button id="upload" class="green">⬆ 업로드</button>
  </div>
</header>
<nav class="tabs">
  <button data-view="blocks" class="active">▰ 코드</button>
  <button data-view="code">⌨ 텍스트 코딩</button>
  <button data-view="serial">▤ 시리얼 모니터</button>
</nav>
<main>
  <section class="workspace-panel">
    <div class="workbar">
      <button id="undo" title="실행 취소">↶</button><button id="redo" title="다시 실행">↷</button>
      <span>블록을 끌어서 서로 끼워 연결하세요.</span>
      <button id="center">◎ 블록 찾기</button><button id="clear">🗑 모두 지우기</button>
    </div>
    <div id="blocklyDiv"></div>
  </section>
  <aside class="right">
    <section class="codebox">
      <div class="title"><b>Arduino C++</b><button id="copy">복사</button></div>
      <textarea id="code" spellcheck="false" aria-label="Arduino 코드"></textarea>
    </section>
    <section class="serialbox">
      <div class="title"><b>시리얼 모니터</b><select id="baud"><option>9600</option><option>57600</option><option selected>115200</option></select><button id="serialOpen">열기</button><button id="serialClear">지우기</button></div>
      <pre id="serialOut"></pre>
      <div class="send"><input id="serialIn" placeholder="전송 내용"><button id="send">Send</button></div>
    </section>
  </aside>
</main>
<div id="toast"></div>
<dialog id="progress"><h2 id="pTitle">컴파일 중</h2><p id="pText"></p><progress id="bar" max="100"></progress><pre id="log"></pre><button id="closeProgress">닫기</button></dialog>
<script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
<script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
<script src="https://unpkg.com/blockly/msg/ko.js"></script>
<script src="app.js"></script>
</body>
</html>
