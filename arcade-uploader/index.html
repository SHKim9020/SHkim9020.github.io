<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#e66f2f">
  <title>MakeCode Arcade 열기</title>
  <meta http-equiv="refresh" content="1;url=https://arcade.makecode.com/?lang=ko">
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; }
    body {
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fb;
      color: #172033;
    }
    .card {
      width: min(560px, 100%);
      padding: 34px;
      background: #fff;
      border: 1px solid #dfe5ef;
      border-radius: 20px;
      box-shadow: 0 18px 55px rgba(24, 36, 58, .14);
      text-align: center;
    }
    .loader {
      width: 46px;
      height: 46px;
      margin: 0 auto 20px;
      border: 5px solid #e3e8f2;
      border-top-color: #e66f2f;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { margin: 0 0 12px; font-size: 26px; }
    p { margin: 0 0 22px; color: #5f6c82; line-height: 1.65; }
    a {
      display: inline-block;
      padding: 13px 20px;
      border-radius: 12px;
      background: #e66f2f;
      color: #fff;
      text-decoration: none;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="loader" aria-hidden="true"></div>
    <h1>MakeCode Arcade로 이동합니다</h1>
    <p>편집기와 USB 권한이 차단되지 않도록 공식 MakeCode Arcade를 현재 탭에서 직접 엽니다.</p>
    <a id="open" href="https://arcade.makecode.com/?lang=ko">지금 열기</a>
  </main>
  <script>
    const target = "https://arcade.makecode.com/?lang=ko";
    setTimeout(() => location.replace(target), 400);
  </script>
</body>
</html>
