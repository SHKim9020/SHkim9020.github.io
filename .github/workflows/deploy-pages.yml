name: Build and Deploy Arcade Studio

on:
  push:
    branches: [main]
    paths-ignore:
      - "arcade-deployment-status.json"
      - "arcade-stage.log"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: arcade-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout website
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Microsoft MakeCode Arcade
        id: checkout_arcade
        uses: actions/checkout@v4
        with:
          repository: microsoft/pxt-arcade
          path: _pxt_arcade
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install MakeCode Arcade dependencies
        id: install
        working-directory: _pxt_arcade
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
        run: npm install --no-audit --no-fund

      - name: Build self-hosted MakeCode Arcade editor
        id: build
        working-directory: _pxt_arcade
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public
          node node_modules/pxt-core/built/pxt.js staticpkg \
            --route arcade-uploader/editor \
            --output "$RUNNER_TEMP/pxt-static"

      - name: Assemble and verify custom web app
        id: stage
        continue-on-error: true
        shell: bash
        run: |
          exec > >(tee "$GITHUB_WORKSPACE/arcade-stage.log") 2>&1
          set -euxo pipefail

          if [ -f "$RUNNER_TEMP/pxt-static/arcade-uploader/editor/index.html" ]; then
            SRC="$RUNNER_TEMP/pxt-static/arcade-uploader/editor"
          elif [ -f "$RUNNER_TEMP/pxt-static/index.html" ]; then
            SRC="$RUNNER_TEMP/pxt-static"
          elif [ -f "$GITHUB_WORKSPACE/_pxt_arcade/built/packaged/arcade-uploader/editor/index.html" ]; then
            SRC="$GITHUB_WORKSPACE/_pxt_arcade/built/packaged/arcade-uploader/editor"
          else
            echo "Generated MakeCode Arcade editor was not found."
            find "$RUNNER_TEMP" "$GITHUB_WORKSPACE/_pxt_arcade/built" -name index.html -print | head -100 || true
            exit 1
          fi

          test -s "$GITHUB_WORKSPACE/arcade-uploader-shell/index.html"
          test -s "$GITHUB_WORKSPACE/arcade-uploader-shell/style.css"
          test -s "$GITHUB_WORKSPACE/arcade-uploader-shell/app.js"

          rm -rf "$GITHUB_WORKSPACE/arcade-uploader"
          mkdir -p "$GITHUB_WORKSPACE/arcade-uploader/editor"
          cp -a "$GITHUB_WORKSPACE/arcade-uploader-shell"/. "$GITHUB_WORKSPACE/arcade-uploader/"
          cp -a "$SRC"/. "$GITHUB_WORKSPACE/arcade-uploader/editor/"
          touch "$GITHUB_WORKSPACE/.nojekyll"

          SHELL_INDEX="$GITHUB_WORKSPACE/arcade-uploader/index.html"
          EDITOR_INDEX="$GITHUB_WORKSPACE/arcade-uploader/editor/index.html"
          TARGET="$GITHUB_WORKSPACE/arcade-uploader/editor/target.js"
          PXTAPP="$GITHUB_WORKSPACE/arcade-uploader/editor/pxtapp.js"
          MAIN="$GITHUB_WORKSPACE/arcade-uploader/editor/main.js"

          test -s "$SHELL_INDEX"
          test -s "$GITHUB_WORKSPACE/arcade-uploader/style.css"
          test -s "$GITHUB_WORKSPACE/arcade-uploader/app.js"
          test -s "$EDITOR_INDEX"
          test -s "$TARGET"
          test -s "$PXTAPP"
          test -s "$MAIN"

          grep -Fq 'OneMakerLab Arcade Studio' "$SHELL_INDEX"
          grep -Fq 'editor/?controller=1' "$SHELL_INDEX"
          grep -Fq 'MICROBIT 드라이브 선택' "$SHELL_INDEX"
          grep -Fq 'Microsoft MakeCode Arcade' "$EDITOR_INDEX"
          grep -Fq '/arcade-uploader/editor/' "$EDITOR_INDEX"

          editor_files=$(find "$GITHUB_WORKSPACE/arcade-uploader/editor" -type f | wc -l)
          editor_index_size=$(wc -c < "$EDITOR_INDEX")
          target_size=$(wc -c < "$TARGET")
          shell_size=$(wc -c < "$SHELL_INDEX")
          echo "Editor files: $editor_files"
          echo "Shell index bytes: $shell_size"
          echo "Editor index bytes: $editor_index_size"
          echo "target.js bytes: $target_size"
          test "$editor_files" -ge 20
          test "$shell_size" -ge 1000
          test "$editor_index_size" -ge 1000
          test "$target_size" -ge 100000

          printf '%s\n' \
            '{' \
            '  "status": "success",' \
            "  \"builtAt\": \"$(date -u +%FT%TZ)\"," \
            '  "app": "OneMakerLab Arcade Studio",' \
            '  "editor": "Microsoft MakeCode Arcade",' \
            '  "route": "/arcade-uploader/",' \
            '  "editorRoute": "/arcade-uploader/editor/",' \
            "  \"websiteCommit\": \"$GITHUB_SHA\"," \
            "  \"editorFiles\": $editor_files," \
            "  \"shellIndexBytes\": $shell_size," \
            "  \"editorIndexBytes\": $editor_index_size," \
            "  \"targetBytes\": $target_size" \
            '}' > "$GITHUB_WORKSPACE/arcade-uploader/build-info.json"

          echo "editor_files=$editor_files" >> "$GITHUB_OUTPUT"
          echo "shell_size=$shell_size" >> "$GITHUB_OUTPUT"
          echo "editor_index_size=$editor_index_size" >> "$GITHUB_OUTPUT"
          echo "target_size=$target_size" >> "$GITHUB_OUTPUT"
          rm -rf "$GITHUB_WORKSPACE/_pxt_arcade"
          echo "STAGE_SUCCESS"

      - name: Upload staging diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arcade-stage-diagnostics
          path: arcade-stage.log
          if-no-files-found: error

      - name: Configure GitHub Pages
        id: configure
        if: steps.stage.outcome == 'success'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload verified website
        id: upload
        if: steps.stage.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy verified website
        id: deploy
        if: steps.stage.outcome == 'success'
        uses: actions/deploy-pages@v4

      - name: Verify live custom web app
        id: smoke
        if: steps.deploy.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -uo pipefail
          BASE="https://shkim9020.github.io/arcade-uploader/"
          CACHE="v=$GITHUB_SHA"
          SHELL_HTML="$RUNNER_TEMP/live-shell.html"
          EDITOR_HTML="$RUNNER_TEMP/live-editor.html"
          INFO="$RUNNER_TEMP/live-build-info.json"
          success=0
          http_code="000"; editor_code="000"; app_code="000"; css_code="000"; target_code="000"; info_code="000"
          custom_shell=false; editor_loaded=false; redirect_detected=true; info_commit=false

          for attempt in $(seq 1 50); do
            http_code=$(curl -L -sS --max-time 90 -H 'Cache-Control: no-cache' -o "$SHELL_HTML" -w '%{http_code}' "${BASE}?${CACHE}&attempt=${attempt}" || true)
            editor_code=$(curl -L -sS --max-time 90 -H 'Cache-Control: no-cache' -o "$EDITOR_HTML" -w '%{http_code}' "${BASE}editor/?${CACHE}" || true)
            app_code=$(curl -L -sS --max-time 90 -o "$RUNNER_TEMP/live-app.js" -w '%{http_code}' "${BASE}app.js?${CACHE}" || true)
            css_code=$(curl -L -sS --max-time 90 -o "$RUNNER_TEMP/live-style.css" -w '%{http_code}' "${BASE}style.css?${CACHE}" || true)
            target_code=$(curl -L -sS --max-time 90 -o "$RUNNER_TEMP/live-target.js" -w '%{http_code}' "${BASE}editor/target.js?${CACHE}" || true)
            info_code=$(curl -L -sS --max-time 90 -o "$INFO" -w '%{http_code}' "${BASE}build-info.json?${CACHE}" || true)

            grep -Fq 'OneMakerLab Arcade Studio' "$SHELL_HTML" 2>/dev/null && custom_shell=true || custom_shell=false
            grep -Fq 'Microsoft MakeCode Arcade' "$EDITOR_HTML" 2>/dev/null && editor_loaded=true || editor_loaded=false
            if grep -Fq 'location.replace(target)' "$SHELL_HTML" 2>/dev/null || grep -Fqi 'http-equiv="refresh"' "$SHELL_HTML" 2>/dev/null; then redirect_detected=true; else redirect_detected=false; fi
            grep -Fq "\"websiteCommit\": \"$GITHUB_SHA\"" "$INFO" 2>/dev/null && info_commit=true || info_commit=false

            echo "attempt=$attempt shell=$http_code custom=$custom_shell editor=$editor_code editorLoaded=$editor_loaded app=$app_code css=$css_code target=$target_code info=$info_code redirect=$redirect_detected commit=$info_commit"

            if [ "$http_code" = 200 ] && [ "$custom_shell" = true ] && [ "$editor_code" = 200 ] && [ "$editor_loaded" = true ] && [ "$app_code" = 200 ] && [ "$css_code" = 200 ] && [ "$target_code" = 200 ] && [ "$info_code" = 200 ] && [ "$redirect_detected" = false ] && [ "$info_commit" = true ]; then
              success=1
              break
            fi
            sleep 15
          done

          echo "status=$([ "$success" -eq 1 ] && echo success || echo failure)" >> "$GITHUB_OUTPUT"
          echo "http_code=$http_code" >> "$GITHUB_OUTPUT"
          echo "editor_code=$editor_code" >> "$GITHUB_OUTPUT"
          echo "custom_shell=$custom_shell" >> "$GITHUB_OUTPUT"
          echo "editor_loaded=$editor_loaded" >> "$GITHUB_OUTPUT"
          echo "app_code=$app_code" >> "$GITHUB_OUTPUT"
          echo "css_code=$css_code" >> "$GITHUB_OUTPUT"
          echo "target_code=$target_code" >> "$GITHUB_OUTPUT"
          echo "info_code=$info_code" >> "$GITHUB_OUTPUT"
          echo "redirect_detected=$redirect_detected" >> "$GITHUB_OUTPUT"
          echo "info_commit=$info_commit" >> "$GITHUB_OUTPUT"
          [ "$success" -eq 1 ]

      - name: Record deployment verification result
        if: always()
        shell: bash
        run: |
          cat > arcade-deployment-status.json <<EOF
          {
            "status": "${{ steps.smoke.outputs.status || 'failure' }}",
            "checkedAt": "$(date -u +%FT%TZ)",
            "sourceCommit": "$GITHUB_SHA",
            "publicUrl": "https://shkim9020.github.io/arcade-uploader/",
            "build": "${{ steps.build.outcome }}",
            "stage": "${{ steps.stage.outcome }}",
            "deployPages": "${{ steps.deploy.outcome }}",
            "httpCode": "${{ steps.smoke.outputs.http_code }}",
            "customShell": "${{ steps.smoke.outputs.custom_shell }}",
            "editorHttp": "${{ steps.smoke.outputs.editor_code }}",
            "editorLoaded": "${{ steps.smoke.outputs.editor_loaded }}",
            "appJsHttp": "${{ steps.smoke.outputs.app_code }}",
            "styleCssHttp": "${{ steps.smoke.outputs.css_code }}",
            "targetJsHttp": "${{ steps.smoke.outputs.target_code }}",
            "buildInfoHttp": "${{ steps.smoke.outputs.info_code }}",
            "redirectDetected": "${{ steps.smoke.outputs.redirect_detected }}",
            "buildInfoCommitMatches": "${{ steps.smoke.outputs.info_commit }}",
            "editorFiles": "${{ steps.stage.outputs.editor_files }}",
            "shellIndexBytes": "${{ steps.stage.outputs.shell_size }}",
            "editorIndexBytes": "${{ steps.stage.outputs.editor_index_size }}",
            "targetBytes": "${{ steps.stage.outputs.target_size }}"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add arcade-deployment-status.json
          if [ "${{ steps.stage.outcome }}" != "success" ] && [ -f arcade-stage.log ]; then git add arcade-stage.log; fi
          if ! git diff --cached --quiet; then git commit -m "Record Arcade Studio deployment verification [skip ci]"; git push; fi

      - name: Require successful deployment
        if: steps.stage.outcome != 'success' || steps.deploy.outcome != 'success' || steps.smoke.outcome != 'success'
        run: exit 1
