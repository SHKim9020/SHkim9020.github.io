name: Build and Deploy MakeCode Arcade

on:
  push:
    branches: [main]
    paths-ignore:
      - "arcade-deployment-status.json"
      - "arcade-stage.log"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: arcade-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout website
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Microsoft MakeCode Arcade
        id: checkout_arcade
        uses: actions/checkout@v4
        with:
          repository: microsoft/pxt-arcade
          path: _pxt_arcade
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install MakeCode Arcade dependencies
        id: install
        working-directory: _pxt_arcade
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
        run: npm install --no-audit --no-fund

      - name: Build static MakeCode Arcade editor
        id: build
        working-directory: _pxt_arcade
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public
          node node_modules/pxt-core/built/pxt.js staticpkg \
            --route arcade-uploader \
            --output "$RUNNER_TEMP/pxt-static"

      - name: Install and verify generated editor
        id: stage
        continue-on-error: true
        shell: bash
        run: |
          exec > >(tee "$GITHUB_WORKSPACE/arcade-stage.log") 2>&1
          set -euxo pipefail

          if [ -f "$RUNNER_TEMP/pxt-static/arcade-uploader/index.html" ]; then
            SRC="$RUNNER_TEMP/pxt-static/arcade-uploader"
          elif [ -f "$RUNNER_TEMP/pxt-static/index.html" ]; then
            SRC="$RUNNER_TEMP/pxt-static"
          elif [ -f "$GITHUB_WORKSPACE/_pxt_arcade/built/packaged/arcade-uploader/index.html" ]; then
            SRC="$GITHUB_WORKSPACE/_pxt_arcade/built/packaged/arcade-uploader"
          else
            echo "Generated MakeCode Arcade index.html was not found."
            find "$RUNNER_TEMP" "$GITHUB_WORKSPACE/_pxt_arcade/built" -name index.html -print | head -100 || true
            exit 1
          fi

          echo "Using generated editor at $SRC"
          rm -rf "$GITHUB_WORKSPACE/arcade-uploader"
          mkdir -p "$GITHUB_WORKSPACE/arcade-uploader"
          cp -a "$SRC"/. "$GITHUB_WORKSPACE/arcade-uploader/"
          touch "$GITHUB_WORKSPACE/.nojekyll"

          INDEX="$GITHUB_WORKSPACE/arcade-uploader/index.html"
          TARGET="$GITHUB_WORKSPACE/arcade-uploader/target.js"
          PXTAPP="$GITHUB_WORKSPACE/arcade-uploader/pxtapp.js"
          MAIN="$GITHUB_WORKSPACE/arcade-uploader/main.js"

          ls -lh "$INDEX" "$TARGET" "$PXTAPP" "$MAIN"
          test -s "$INDEX"
          test -s "$TARGET"
          test -s "$PXTAPP"
          test -s "$MAIN"
          grep -Fq 'Microsoft MakeCode Arcade' "$INDEX"
          grep -Fq '/arcade-uploader/' "$INDEX"

          file_count=$(find "$GITHUB_WORKSPACE/arcade-uploader" -type f | wc -l)
          index_size=$(wc -c < "$INDEX")
          target_size=$(wc -c < "$TARGET")
          echo "Generated files: $file_count"
          echo "index.html bytes: $index_size"
          echo "target.js bytes: $target_size"
          test "$file_count" -ge 20
          test "$index_size" -ge 1000
          test "$target_size" -ge 100000

          printf '%s\n' \
            '{' \
            '  "status": "success",' \
            "  \"builtAt\": \"$(date -u +%FT%TZ)\"," \
            '  "source": "microsoft/pxt-arcade",' \
            '  "route": "/arcade-uploader/",' \
            "  \"websiteCommit\": \"$GITHUB_SHA\"," \
            "  \"generatedFiles\": $file_count," \
            "  \"indexBytes\": $index_size," \
            "  \"targetBytes\": $target_size" \
            '}' > "$GITHUB_WORKSPACE/arcade-uploader/build-info.json"

          cat "$GITHUB_WORKSPACE/arcade-uploader/build-info.json"
          echo "file_count=$file_count" >> "$GITHUB_OUTPUT"
          echo "index_size=$index_size" >> "$GITHUB_OUTPUT"
          echo "target_size=$target_size" >> "$GITHUB_OUTPUT"
          rm -rf "$GITHUB_WORKSPACE/_pxt_arcade"
          echo "STAGE_SUCCESS"

      - name: Upload staging diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arcade-stage-diagnostics
          path: arcade-stage.log
          if-no-files-found: error

      - name: Configure GitHub Pages
        id: configure
        if: steps.stage.outcome == 'success'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload verified website
        id: upload
        if: steps.stage.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy verified website
        id: deploy
        if: steps.stage.outcome == 'success'
        uses: actions/deploy-pages@v4

      - name: Verify live public website
        id: smoke
        if: steps.deploy.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -uo pipefail
          BASE="https://shkim9020.github.io/arcade-uploader/"
          CACHE="v=$GITHUB_SHA"
          HTML="$RUNNER_TEMP/live-index.html"
          INFO="$RUNNER_TEMP/live-build-info.json"
          success=0
          http_code="000"; effective=""; has_title=false; has_route=false; redirect_detected=true
          target_code="000"; pxtapp_code="000"; main_code="000"; info_code="000"; info_status=false; info_commit=false

          for attempt in $(seq 1 40); do
            response=$(curl -L -sS --max-time 90 -H 'Cache-Control: no-cache' -o "$HTML" -w '%{http_code}|%{url_effective}' "${BASE}?${CACHE}&attempt=${attempt}" || true)
            http_code=${response%%|*}; effective=${response#*|}
            grep -Fq 'Microsoft MakeCode Arcade' "$HTML" 2>/dev/null && has_title=true || has_title=false
            grep -Fq '/arcade-uploader/' "$HTML" 2>/dev/null && has_route=true || has_route=false
            if grep -Fq 'location.replace(target)' "$HTML" 2>/dev/null || grep -Fqi 'http-equiv="refresh"' "$HTML" 2>/dev/null; then redirect_detected=true; else redirect_detected=false; fi
            target_code=$(curl -L -sS --max-time 90 -o "$RUNNER_TEMP/live-target.js" -w '%{http_code}' "${BASE}target.js?${CACHE}" || true)
            pxtapp_code=$(curl -L -sS --max-time 90 -o "$RUNNER_TEMP/live-pxtapp.js" -w '%{http_code}' "${BASE}pxtapp.js?${CACHE}" || true)
            main_code=$(curl -L -sS --max-time 90 -o "$RUNNER_TEMP/live-main.js" -w '%{http_code}' "${BASE}main.js?${CACHE}" || true)
            info_code=$(curl -L -sS --max-time 90 -o "$INFO" -w '%{http_code}' "${BASE}build-info.json?${CACHE}" || true)
            grep -Fq '"status": "success"' "$INFO" 2>/dev/null && info_status=true || info_status=false
            grep -Fq "\"websiteCommit\": \"$GITHUB_SHA\"" "$INFO" 2>/dev/null && info_commit=true || info_commit=false
            if [ "$http_code" = 200 ] && [ "$has_title" = true ] && [ "$has_route" = true ] && [ "$redirect_detected" = false ] && [ "$target_code" = 200 ] && [ "$pxtapp_code" = 200 ] && [ "$main_code" = 200 ] && [ "$info_code" = 200 ] && [ "$info_status" = true ] && [ "$info_commit" = true ]; then success=1; break; fi
            sleep 15
          done

          echo "status=$([ "$success" -eq 1 ] && echo success || echo failure)" >> "$GITHUB_OUTPUT"
          echo "http_code=$http_code" >> "$GITHUB_OUTPUT"
          echo "effective=$effective" >> "$GITHUB_OUTPUT"
          echo "has_title=$has_title" >> "$GITHUB_OUTPUT"
          echo "has_route=$has_route" >> "$GITHUB_OUTPUT"
          echo "redirect_detected=$redirect_detected" >> "$GITHUB_OUTPUT"
          echo "target_code=$target_code" >> "$GITHUB_OUTPUT"
          echo "pxtapp_code=$pxtapp_code" >> "$GITHUB_OUTPUT"
          echo "main_code=$main_code" >> "$GITHUB_OUTPUT"
          echo "info_code=$info_code" >> "$GITHUB_OUTPUT"
          echo "info_status=$info_status" >> "$GITHUB_OUTPUT"
          echo "info_commit=$info_commit" >> "$GITHUB_OUTPUT"
          [ "$success" -eq 1 ]

      - name: Record deployment verification result
        if: always()
        shell: bash
        run: |
          cat > arcade-deployment-status.json <<EOF
          {
            "status": "${{ steps.smoke.outputs.status || 'failure' }}",
            "checkedAt": "$(date -u +%FT%TZ)",
            "sourceCommit": "$GITHUB_SHA",
            "publicUrl": "https://shkim9020.github.io/arcade-uploader/",
            "checkoutArcade": "${{ steps.checkout_arcade.outcome }}",
            "install": "${{ steps.install.outcome }}",
            "build": "${{ steps.build.outcome }}",
            "stage": "${{ steps.stage.outcome }}",
            "configurePages": "${{ steps.configure.outcome }}",
            "uploadPages": "${{ steps.upload.outcome }}",
            "deployPages": "${{ steps.deploy.outcome }}",
            "httpCode": "${{ steps.smoke.outputs.http_code }}",
            "effectiveUrl": "${{ steps.smoke.outputs.effective }}",
            "hasMakeCodeTitle": "${{ steps.smoke.outputs.has_title }}",
            "hasArcadeRoute": "${{ steps.smoke.outputs.has_route }}",
            "redirectDetected": "${{ steps.smoke.outputs.redirect_detected }}",
            "targetJsHttp": "${{ steps.smoke.outputs.target_code }}",
            "pxtAppJsHttp": "${{ steps.smoke.outputs.pxtapp_code }}",
            "mainJsHttp": "${{ steps.smoke.outputs.main_code }}",
            "buildInfoHttp": "${{ steps.smoke.outputs.info_code }}",
            "buildInfoStatus": "${{ steps.smoke.outputs.info_status }}",
            "buildInfoCommitMatches": "${{ steps.smoke.outputs.info_commit }}",
            "generatedFiles": "${{ steps.stage.outputs.file_count }}",
            "indexBytes": "${{ steps.stage.outputs.index_size }}",
            "targetBytes": "${{ steps.stage.outputs.target_size }}"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add arcade-deployment-status.json
          if [ "${{ steps.stage.outcome }}" != "success" ] && [ -f arcade-stage.log ]; then git add arcade-stage.log; fi
          if ! git diff --cached --quiet; then git commit -m "Record Arcade deployment verification [skip ci]"; git push; fi

      - name: Require successful deployment
        if: steps.stage.outcome != 'success' || steps.deploy.outcome != 'success' || steps.smoke.outcome != 'success'
        run: exit 1
