name: Build and Deploy MakeCode Arcade

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: arcade-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout website
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install PXT CLI
        run: npm install -g pxt

      - name: Clone MakeCode Arcade
        run: git clone --depth 1 https://github.com/microsoft/pxt-arcade.git "$RUNNER_TEMP/pxt-arcade"

      - name: Install target dependencies
        working-directory: ${{ runner.temp }}/pxt-arcade
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
        run: npm install --no-audit --no-fund

      - name: Build MakeCode Arcade target
        working-directory: ${{ runner.temp }}/pxt-arcade
        env:
          CI: "true"
        run: pxt buildtarget

      - name: Prepare PXT public assets
        working-directory: ${{ runner.temp }}/pxt-arcade
        shell: bash
        run: |
          set -euo pipefail
          rm -rf public
          cp -a node_modules/pxt-core/webapp/public public
          test -d public
          test "$(find public -type f | wc -l)" -gt 10

      - name: Build static MakeCode Arcade editor
        working-directory: ${{ runner.temp }}/pxt-arcade
        env:
          CI: "true"
        run: |
          pxt staticpkg \
            --route arcade-uploader \
            --output "$RUNNER_TEMP/pxt-static"

      - name: Install and verify generated editor
        shell: bash
        run: |
          set -euo pipefail

          if [ -f "$RUNNER_TEMP/pxt-static/arcade-uploader/index.html" ]; then
            SRC="$RUNNER_TEMP/pxt-static/arcade-uploader"
          elif [ -f "$RUNNER_TEMP/pxt-static/index.html" ]; then
            SRC="$RUNNER_TEMP/pxt-static"
          elif [ -f "$RUNNER_TEMP/pxt-arcade/built/packaged/arcade-uploader/index.html" ]; then
            SRC="$RUNNER_TEMP/pxt-arcade/built/packaged/arcade-uploader"
          else
            echo "Generated MakeCode Arcade index.html was not found."
            find "$RUNNER_TEMP" -name index.html -print | sed -n '1,100p'
            exit 1
          fi

          rm -rf "$GITHUB_WORKSPACE/arcade-uploader"
          mkdir -p "$GITHUB_WORKSPACE/arcade-uploader"
          cp -a "$SRC"/. "$GITHUB_WORKSPACE/arcade-uploader/"
          touch "$GITHUB_WORKSPACE/.nojekyll"

          test -s "$GITHUB_WORKSPACE/arcade-uploader/index.html"
          test -s "$GITHUB_WORKSPACE/arcade-uploader/target.js"
          test -s "$GITHUB_WORKSPACE/arcade-uploader/pxtapp.js"
          grep -q '/arcade-uploader/' "$GITHUB_WORKSPACE/arcade-uploader/index.html"
          grep -q 'Microsoft MakeCode Arcade' "$GITHUB_WORKSPACE/arcade-uploader/index.html"

          file_count=$(find "$GITHUB_WORKSPACE/arcade-uploader" -type f | wc -l)
          index_size=$(wc -c < "$GITHUB_WORKSPACE/arcade-uploader/index.html")
          echo "Generated files: $file_count"
          echo "index.html bytes: $index_size"
          test "$file_count" -gt 1000
          test "$index_size" -gt 5000

          cat > "$GITHUB_WORKSPACE/arcade-uploader/build-info.json" <<EOF
          {
            "status": "success",
            "builtAt": "$(date -u +%FT%TZ)",
            "source": "microsoft/pxt-arcade",
            "route": "/arcade-uploader/",
            "websiteCommit": "$GITHUB_SHA"
          }
          EOF

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload verified website
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy verified website
        id: deployment
        uses: actions/deploy-pages@v4
