name: Build and Deploy MakeCode Arcade

on:
  push:
    branches: [main]
    paths-ignore:
      - "arcade-deployment-status.json"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: arcade-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout website
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install PXT CLI
        run: npm install -g pxt

      - name: Clone MakeCode Arcade
        run: git clone --depth 1 https://github.com/microsoft/pxt-arcade.git "$RUNNER_TEMP/pxt-arcade"

      - name: Install target dependencies
        working-directory: ${{ runner.temp }}/pxt-arcade
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
        run: npm install --no-audit --no-fund

      - name: Build MakeCode Arcade target
        working-directory: ${{ runner.temp }}/pxt-arcade
        env:
          CI: "true"
        run: pxt buildtarget

      - name: Prepare PXT public assets
        working-directory: ${{ runner.temp }}/pxt-arcade
        shell: bash
        run: |
          set -euo pipefail
          rm -rf public
          cp -a node_modules/pxt-core/webapp/public public
          test -d public
          test "$(find public -type f | wc -l)" -gt 10

      - name: Build static MakeCode Arcade editor
        working-directory: ${{ runner.temp }}/pxt-arcade
        env:
          CI: "true"
        run: |
          pxt staticpkg \
            --route arcade-uploader \
            --output "$RUNNER_TEMP/pxt-static"

      - name: Install and verify generated editor
        shell: bash
        run: |
          set -euo pipefail

          if [ -f "$RUNNER_TEMP/pxt-static/arcade-uploader/index.html" ]; then
            SRC="$RUNNER_TEMP/pxt-static/arcade-uploader"
          elif [ -f "$RUNNER_TEMP/pxt-static/index.html" ]; then
            SRC="$RUNNER_TEMP/pxt-static"
          elif [ -f "$RUNNER_TEMP/pxt-arcade/built/packaged/arcade-uploader/index.html" ]; then
            SRC="$RUNNER_TEMP/pxt-arcade/built/packaged/arcade-uploader"
          else
            echo "Generated MakeCode Arcade index.html was not found."
            find "$RUNNER_TEMP" -name index.html -print | sed -n '1,100p'
            exit 1
          fi

          rm -rf "$GITHUB_WORKSPACE/arcade-uploader"
          mkdir -p "$GITHUB_WORKSPACE/arcade-uploader"
          cp -a "$SRC"/. "$GITHUB_WORKSPACE/arcade-uploader/"
          touch "$GITHUB_WORKSPACE/.nojekyll"

          test -s "$GITHUB_WORKSPACE/arcade-uploader/index.html"
          test -s "$GITHUB_WORKSPACE/arcade-uploader/target.js"
          test -s "$GITHUB_WORKSPACE/arcade-uploader/pxtapp.js"
          test -s "$GITHUB_WORKSPACE/arcade-uploader/main.js"
          grep -q '/arcade-uploader/' "$GITHUB_WORKSPACE/arcade-uploader/index.html"
          grep -q 'Microsoft MakeCode Arcade' "$GITHUB_WORKSPACE/arcade-uploader/index.html"

          file_count=$(find "$GITHUB_WORKSPACE/arcade-uploader" -type f | wc -l)
          index_size=$(wc -c < "$GITHUB_WORKSPACE/arcade-uploader/index.html")
          echo "Generated files: $file_count"
          echo "index.html bytes: $index_size"
          test "$file_count" -gt 1000
          test "$index_size" -gt 5000

          cat > "$GITHUB_WORKSPACE/arcade-uploader/build-info.json" <<EOF
          {
            "status": "success",
            "builtAt": "$(date -u +%FT%TZ)",
            "source": "microsoft/pxt-arcade",
            "route": "/arcade-uploader/",
            "websiteCommit": "$GITHUB_SHA",
            "generatedFiles": $file_count,
            "indexBytes": $index_size
          }
          EOF

          rm -rf "$RUNNER_TEMP/pxt-arcade"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload verified website
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy verified website
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify live public website
        id: smoke
        continue-on-error: true
        shell: bash
        run: |
          set -uo pipefail
          BASE="https://shkim9020.github.io/arcade-uploader/"
          CACHE="v=$GITHUB_SHA"
          LOG="$GITHUB_WORKSPACE/arcade-smoke-test.log"
          HTML="$RUNNER_TEMP/live-index.html"
          INFO="$RUNNER_TEMP/live-build-info.json"
          : > "$LOG"

          success=0
          http_code="000"
          effective=""
          has_title=false
          has_route=false
          redirect_detected=true
          target_code="000"
          pxtapp_code="000"
          main_code="000"
          info_code="000"
          info_status=false
          info_commit=false

          for attempt in $(seq 1 60); do
            echo "Attempt $attempt at $(date -u +%FT%TZ)" | tee -a "$LOG"

            response=$(curl -L -sS --max-time 90 \
              -H 'Cache-Control: no-cache' \
              -H 'Pragma: no-cache' \
              -o "$HTML" -w '%{http_code}|%{url_effective}' "${BASE}?${CACHE}&attempt=${attempt}" 2>>"$LOG" || true)
            http_code=${response%%|*}
            effective=${response#*|}

            grep -q 'Microsoft MakeCode Arcade' "$HTML" 2>/dev/null && has_title=true || has_title=false
            grep -q '/arcade-uploader/' "$HTML" 2>/dev/null && has_route=true || has_route=false
            if grep -Eqi '<meta[^>]+http-equiv=["'"']?refresh|location\.(replace|href).*arcade\.makecode\.com' "$HTML" 2>/dev/null; then
              redirect_detected=true
            else
              redirect_detected=false
            fi

            target_code=$(curl -L -sS --max-time 90 -H 'Cache-Control: no-cache' -o "$RUNNER_TEMP/live-target.js" -w '%{http_code}' "${BASE}target.js?${CACHE}" 2>>"$LOG" || true)
            pxtapp_code=$(curl -L -sS --max-time 90 -H 'Cache-Control: no-cache' -o "$RUNNER_TEMP/live-pxtapp.js" -w '%{http_code}' "${BASE}pxtapp.js?${CACHE}" 2>>"$LOG" || true)
            main_code=$(curl -L -sS --max-time 90 -H 'Cache-Control: no-cache' -o "$RUNNER_TEMP/live-main.js" -w '%{http_code}' "${BASE}main.js?${CACHE}" 2>>"$LOG" || true)
            info_code=$(curl -L -sS --max-time 90 -H 'Cache-Control: no-cache' -o "$INFO" -w '%{http_code}' "${BASE}build-info.json?${CACHE}" 2>>"$LOG" || true)

            grep -q '"status": "success"' "$INFO" 2>/dev/null && info_status=true || info_status=false
            grep -q "\"websiteCommit\": \"$GITHUB_SHA\"" "$INFO" 2>/dev/null && info_commit=true || info_commit=false

            echo "HTTP=$http_code EFFECTIVE=$effective TITLE=$has_title ROUTE=$has_route REDIRECT=$redirect_detected TARGET=$target_code PXTAPP=$pxtapp_code MAIN=$main_code INFO=$info_code INFO_STATUS=$info_status INFO_COMMIT=$info_commit" | tee -a "$LOG"

            if [ "$http_code" = "200" ] \
              && [ "$has_title" = "true" ] \
              && [ "$has_route" = "true" ] \
              && [ "$redirect_detected" = "false" ] \
              && [ "$target_code" = "200" ] \
              && [ "$pxtapp_code" = "200" ] \
              && [ "$main_code" = "200" ] \
              && [ "$info_code" = "200" ] \
              && [ "$info_status" = "true" ] \
              && [ "$info_commit" = "true" ] \
              && test -s "$RUNNER_TEMP/live-target.js" \
              && test -s "$RUNNER_TEMP/live-pxtapp.js" \
              && test -s "$RUNNER_TEMP/live-main.js"; then
                echo "LIVE_SMOKE_TEST=SUCCESS" | tee -a "$LOG"
                success=1
                break
            fi

            sleep 15
          done

          {
            echo "status=$([ "$success" -eq 1 ] && echo success || echo failure)"
            echo "http_code=$http_code"
            echo "effective=$effective"
            echo "has_title=$has_title"
            echo "has_route=$has_route"
            echo "redirect_detected=$redirect_detected"
            echo "target_code=$target_code"
            echo "pxtapp_code=$pxtapp_code"
            echo "main_code=$main_code"
            echo "info_code=$info_code"
            echo "info_status=$info_status"
            echo "info_commit=$info_commit"
          } >> "$GITHUB_OUTPUT"

          [ "$success" -eq 1 ]

      - name: Upload live verification diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arcade-live-smoke-test
          path: arcade-smoke-test.log
          if-no-files-found: warn

      - name: Record deployment verification result
        if: always()
        shell: bash
        run: |
          cat > arcade-deployment-status.json <<EOF
          {
            "status": "${{ steps.smoke.outputs.status || 'failure' }}",
            "checkedAt": "$(date -u +%FT%TZ)",
            "sourceCommit": "$GITHUB_SHA",
            "publicUrl": "https://shkim9020.github.io/arcade-uploader/",
            "httpCode": "${{ steps.smoke.outputs.http_code }}",
            "effectiveUrl": "${{ steps.smoke.outputs.effective }}",
            "hasMakeCodeTitle": "${{ steps.smoke.outputs.has_title }}",
            "hasArcadeRoute": "${{ steps.smoke.outputs.has_route }}",
            "redirectDetected": "${{ steps.smoke.outputs.redirect_detected }}",
            "targetJsHttp": "${{ steps.smoke.outputs.target_code }}",
            "pxtAppJsHttp": "${{ steps.smoke.outputs.pxtapp_code }}",
            "mainJsHttp": "${{ steps.smoke.outputs.main_code }}",
            "buildInfoHttp": "${{ steps.smoke.outputs.info_code }}",
            "buildInfoStatus": "${{ steps.smoke.outputs.info_status }}",
            "buildInfoCommitMatches": "${{ steps.smoke.outputs.info_commit }}"
          }
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add arcade-deployment-status.json
          if ! git diff --cached --quiet; then
            git commit -m "Record Arcade deployment verification [skip ci]"
            git push
          fi

      - name: Require successful public verification
        if: steps.smoke.outcome != 'success'
        run: exit 1
