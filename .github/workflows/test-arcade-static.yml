name: Test MakeCode Arcade Static Build

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/test-arcade-static.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install PXT CLI
        run: npm install -g pxt

      - name: Clone MakeCode Arcade
        run: git clone --depth 1 https://github.com/microsoft/pxt-arcade.git "$RUNNER_TEMP/pxt-arcade"

      - name: Install target dependencies
        working-directory: ${{ runner.temp }}/pxt-arcade
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
        run: npm install --no-audit --no-fund

      - name: Build MakeCode Arcade target
        id: target_build
        continue-on-error: true
        working-directory: ${{ runner.temp }}/pxt-arcade
        env:
          CI: "true"
        shell: bash
        run: pxt buildtarget > "$RUNNER_TEMP/buildtarget.log" 2>&1

      - name: Upload target build diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildtarget-log
          path: ${{ runner.temp }}/buildtarget.log
          if-no-files-found: error
          retention-days: 3

      - name: Stop after failed target build
        if: steps.target_build.outcome != 'success'
        run: |
          echo "MakeCode Arcade buildtarget failed. Diagnostic log was uploaded."
          exit 1

      - name: Prepare PXT public assets
        working-directory: ${{ runner.temp }}/pxt-arcade
        shell: bash
        run: |
          set -euo pipefail
          rm -rf public
          cp -a node_modules/pxt-core/webapp/public public
          test -d public
          test "$(find public -type f | wc -l)" -gt 10
          echo "Prepared $(find public -type f | wc -l) public asset files."

      - name: Build static editor
        id: static_build
        continue-on-error: true
        working-directory: ${{ runner.temp }}/pxt-arcade
        env:
          CI: "true"
        shell: bash
        run: |
          pxt staticpkg \
            --route arcade-uploader \
            --output "$RUNNER_TEMP/pxt-static" \
            --minify > "$RUNNER_TEMP/staticpkg.log" 2>&1

      - name: Upload static build diagnostic log
        if: always() && steps.target_build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: staticpkg-log
          path: ${{ runner.temp }}/staticpkg.log
          if-no-files-found: error
          retention-days: 3

      - name: Stop after failed static build
        if: steps.target_build.outcome == 'success' && steps.static_build.outcome != 'success'
        run: |
          echo "MakeCode Arcade staticpkg failed. Diagnostic log was uploaded."
          exit 1

      - name: Verify generated package
        shell: bash
        run: |
          set -euo pipefail
          find "$RUNNER_TEMP/pxt-static" -maxdepth 3 -type f | head -100

          if [ -f "$RUNNER_TEMP/pxt-static/arcade-uploader/index.html" ]; then
            SRC="$RUNNER_TEMP/pxt-static/arcade-uploader"
          elif [ -f "$RUNNER_TEMP/pxt-static/index.html" ]; then
            SRC="$RUNNER_TEMP/pxt-static"
          elif [ -f "$RUNNER_TEMP/pxt-arcade/built/packaged/arcade-uploader/index.html" ]; then
            SRC="$RUNNER_TEMP/pxt-arcade/built/packaged/arcade-uploader"
          else
            echo "Generated index.html was not found"
            find "$RUNNER_TEMP/pxt-arcade/built" -name index.html -print | head -100 || true
            exit 1
          fi

          test -s "$SRC/index.html"
          grep -q "pxt" "$SRC/index.html" || grep -q "MakeCode" "$SRC/index.html"
          mkdir -p "$GITHUB_WORKSPACE/verified-arcade-uploader"
          cp -a "$SRC"/. "$GITHUB_WORKSPACE/verified-arcade-uploader/"
          touch "$GITHUB_WORKSPACE/verified-arcade-uploader/.nojekyll"

      - name: Upload verified static editor
        uses: actions/upload-artifact@v4
        with:
          name: verified-arcade-uploader
          path: verified-arcade-uploader
          if-no-files-found: error
          retention-days: 3
