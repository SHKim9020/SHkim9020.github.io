name: Build MakeCode Arcade Web App

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-arcade-uploader.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout website repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pxt-arcade/package-lock.json

      - name: Download MakeCode Arcade source
        run: git clone --depth 1 https://github.com/microsoft/pxt-arcade.git pxt-arcade

      - name: Install MakeCode Arcade dependencies
        working-directory: pxt-arcade
        run: npm ci

      - name: Build static MakeCode Arcade package
        working-directory: pxt-arcade
        run: |
          node node_modules/pxt-core/built/pxt.js staticpkg \
            --route arcade-uploader \
            --output "$GITHUB_WORKSPACE/pxt-static" \
            --minify

      - name: Locate and publish built editor
        shell: bash
        run: |
          set -e
          if [ -f "$GITHUB_WORKSPACE/pxt-static/arcade-uploader/index.html" ]; then
            SRC="$GITHUB_WORKSPACE/pxt-static/arcade-uploader"
          elif [ -f "$GITHUB_WORKSPACE/pxt-static/index.html" ]; then
            SRC="$GITHUB_WORKSPACE/pxt-static"
          elif [ -f "$GITHUB_WORKSPACE/pxt-arcade/built/packaged/arcade-uploader/index.html" ]; then
            SRC="$GITHUB_WORKSPACE/pxt-arcade/built/packaged/arcade-uploader"
          else
            echo "Static package index.html was not found."
            find "$GITHUB_WORKSPACE" -path '*index.html' | head -50
            exit 1
          fi

          rm -rf "$GITHUB_WORKSPACE/arcade-uploader"
          mkdir -p "$GITHUB_WORKSPACE/arcade-uploader"
          cp -a "$SRC"/. "$GITHUB_WORKSPACE/arcade-uploader/"
          touch "$GITHUB_WORKSPACE/arcade-uploader/.nojekyll"

      - name: Commit generated web app
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add arcade-uploader
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Deploy MakeCode Arcade static editor [skip ci]"
            git push
          fi
